<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrograde Millennials Club</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07060f; --surface:#0e0c1a; --surface2:#130f22; --border:#2a1f3d;
  --crimson:#8b1a2a; --crimson2:#c0293e;
  --gold:#c9a84c; --gold2:#f0d080;
  --navy:#0f1b3d; --navy2:#1a2d5a; --sapphire:#2a4a8a;
  --violet:#6b3fa0; --violet2:#a07fd8;
  --emerald:#1a5c3a; --emerald2:#2a9a5e;
  --text:#e8dfc8; --muted:#7a6d8a;
  --glow-r:rgba(139,26,42,0.35); --glow-b:rgba(42,74,138,0.35);
  --glow-v:rgba(107,63,160,0.35); --glow-g:rgba(42,154,94,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IM Fell English',Georgia,serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 50% at 15% 20%,rgba(139,26,42,.18) 0%,transparent 70%),
  radial-gradient(ellipse 60% 50% at 85% 70%,rgba(42,74,138,.18) 0%,transparent 70%),
  radial-gradient(ellipse 40% 30% at 50% 50%,rgba(20,10,40,.5) 0%,transparent 100%);
  pointer-events:none;z-index:0;}
/* SVG noise filter removed — GPU-expensive on iOS Safari */

.wrapper{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:40px 24px 100px;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:32px;}
.crest{font-size:36px;margin-bottom:10px;filter:drop-shadow(0 0 12px var(--crimson2));animation:breathe 4s ease-in-out infinite;}
@keyframes breathe{
  0%,100%{filter:drop-shadow(0 0 12px var(--crimson2));}
  50%{filter:drop-shadow(0 0 28px var(--sapphire)) drop-shadow(0 0 10px var(--gold));}
}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,5vw,46px);font-weight:900;letter-spacing:.05em;
  background:linear-gradient(135deg,var(--crimson2) 0%,var(--gold2) 45%,var(--sapphire) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.subtitle{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.28em;color:var(--muted);margin-top:10px;text-transform:uppercase;font-style:italic;}
.header-rule{display:flex;align-items:center;gap:12px;margin-top:18px;}
.header-rule::before,.header-rule::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--crimson),var(--sapphire),transparent);}
.header-rule span{color:var(--gold);font-size:15px;}

/* ── USER BAR ── */
#user-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;}
.ub-left{flex:1;display:flex;align-items:center;gap:10px;}
.ub-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--border);background:var(--surface2);}
.ub-name{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;color:var(--gold2);}
.ub-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:1px;}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:var(--crimson2);color:var(--crimson2);}

/* ── MEMBERS PANEL ── */
#members-panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px 18px;margin-bottom:20px;}
.members-panel-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.members-panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.members-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.member-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:14px 12px;text-align:center;position:relative;transition:border-color .2s;}
.member-card.is-me{border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.15);}
.member-card.empty{opacity:.4;}
.mc-avatar{font-size:22px;margin-bottom:6px;}
.mc-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;color:var(--text);margin-bottom:8px;word-break:break-all;}
.mc-you{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;position:absolute;top:6px;right:8px;}
.mc-stats{display:flex;flex-direction:column;gap:4px;}
.mc-stat{display:flex;justify-content:space-between;align-items:center;font-size:10px;}
.mc-stat-label{font-family:'Cinzel',serif;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-size:9px;}
.mc-stat-val{font-family:'Cinzel',serif;font-size:11px;color:var(--text);}
.mc-stat-val.s1{color:#6a9fd8;}
.mc-stat-val.s2{color:#d08030;}
.mc-stat-val.s3{color:var(--gold2);}
.mc-divider{height:1px;background:var(--border);margin:6px 0;}

/* ── GATE ── */
#gate{position:fixed;inset:0;z-index:200;background:rgba(7,6,15,.97);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease;-webkit-transform:translateZ(0);transform:translateZ(0);}
.gate-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:40px 36px;width:100%;max-width:460px;text-align:center;position:relative;}
.gate-box::before{content:'';position:absolute;inset:0;border-radius:6px;background:linear-gradient(135deg,rgba(139,26,42,.08),rgba(42,74,138,.08));pointer-events:none;}
.gate-title{font-family:'Cinzel Decorative',serif;font-size:20px;color:var(--gold2);margin-bottom:4px;position:relative;}
.gate-sub{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:28px;position:relative;}
.gate-err{color:var(--crimson2);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;min-height:18px;margin-bottom:8px;position:relative;}

.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;position:relative;}
.slot-card{border:1px solid var(--border);border-radius:4px;padding:16px 8px;cursor:pointer;transition:all .2s;background:var(--surface2);text-align:center;}
.slot-card:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.2);}
.slot-card.selected{border-color:var(--gold2);box-shadow:0 0 18px rgba(201,168,76,.3);}
.slot-avi{font-size:26px;margin-bottom:6px;}
.slot-uname{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;color:var(--text);}
.slot-hint{font-size:9px;color:var(--muted);margin-top:3px;font-style:italic;}

.gate-form{display:flex;flex-direction:column;gap:12px;position:relative;}
.gate-inp{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;color:var(--text);font-family:'IM Fell English',serif;font-size:15px;outline:none;text-align:center;transition:border-color .2s;width:100%;}
.gate-inp:focus{border-color:var(--gold);}
.gate-inp::placeholder{color:var(--muted);font-style:italic;}

.pin-display{display:flex;justify-content:center;gap:11px;margin:6px 0;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:1px solid var(--muted);background:transparent;transition:all .15s;}
.pin-dot.on{background:var(--gold);border-color:var(--gold2);box-shadow:0 0 8px rgba(201,168,76,.5);}

.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.pkey{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:13px;color:var(--text);font-family:'Cinzel',serif;font-size:17px;cursor:pointer;transition:all .15s;user-select:none;}
.pkey:hover{border-color:var(--gold);color:var(--gold2);background:rgba(201,168,76,.08);}
.pkey:active{transform:scale(.93);}
.pkey.del{font-size:12px;color:var(--muted);}

.btn-primary{background:linear-gradient(135deg,var(--crimson),var(--navy2));border:1px solid var(--crimson2);border-radius:4px;color:var(--gold2);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:13px;cursor:pointer;transition:all .2s;width:100%;}
.btn-primary:hover{box-shadow:0 0 16px var(--glow-r);}
.btn-link{background:none;border:none;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:underline;transition:color .2s;}
.btn-link:hover{color:var(--gold);}

/* ── MAIN TABS ── */
.tab-nav{display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:32px;background:var(--surface);}
.tab-btn{flex:1;padding:13px 4px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.07em;cursor:pointer;transition:all .3s;text-transform:uppercase;position:relative;overflow:hidden;}
.tab-btn:last-child{border-right:none;}
.tab-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;}
.tab-btn.games::before   {background:linear-gradient(135deg,rgba(139,26,42,.3),transparent);}
.tab-btn.shows::before   {background:linear-gradient(135deg,rgba(42,74,138,.3),transparent);}
.tab-btn.books::before   {background:linear-gradient(135deg,rgba(201,168,76,.2),transparent);}
.tab-btn.reviews::before {background:linear-gradient(135deg,rgba(107,63,160,.3),transparent);}
.tab-btn.essays::before  {background:linear-gradient(135deg,rgba(42,154,94,.25),transparent);}
.tab-btn.active::before{opacity:1;}
.tab-btn.active{color:var(--gold2);}
.tab-btn.active.games   {box-shadow:inset 0 -2px 0 var(--crimson2);}
.tab-btn.active.shows   {box-shadow:inset 0 -2px 0 var(--sapphire);}
.tab-btn.active.books   {box-shadow:inset 0 -2px 0 var(--gold);}
.tab-btn.active.reviews {box-shadow:inset 0 -2px 0 var(--violet2);}
.tab-btn.active.essays  {box-shadow:inset 0 -2px 0 var(--emerald2);}
.tab-btn:hover:not(.active){color:var(--text);}
.tab-icon{display:block;font-size:17px;margin-bottom:3px;}

.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-bottom:28px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 18px;}
.prog-label{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--muted);margin-bottom:10px;text-transform:uppercase;}
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.games .prog-fill  {background:linear-gradient(90deg,var(--crimson),var(--crimson2));}
.shows .prog-fill  {background:linear-gradient(90deg,var(--navy2),var(--sapphire));}
.books .prog-fill  {background:linear-gradient(90deg,var(--gold),var(--gold2));}

/* ── GENRE SECTIONS ── */
.genre-section{margin-bottom:36px;}
.genre-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.genre-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.genre-line{flex:1;height:1px;}
.games .genre-line  {background:linear-gradient(90deg,var(--crimson),transparent);}
.shows .genre-line  {background:linear-gradient(90deg,var(--sapphire),transparent);}
.books .genre-line  {background:linear-gradient(90deg,var(--gold),transparent);}

/* ── ITEM CARDS ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .25s;position:relative;overflow:hidden;}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.games .item-card::before  {background:linear-gradient(180deg,var(--crimson2),var(--crimson));}
.shows .item-card::before  {background:linear-gradient(180deg,var(--sapphire),var(--navy2));}
.books .item-card::before  {background:linear-gradient(180deg,var(--gold2),var(--gold));}
.item-card:hover{border-color:var(--muted);transform:translateY(-1px);}
.games .item-card:hover{box-shadow:0 4px 20px var(--glow-r);}
.shows .item-card:hover{box-shadow:0 4px 20px var(--glow-b);}
.books .item-card:hover{box-shadow:0 4px 20px rgba(201,168,76,.2);}
.item-card.done{opacity:.42;}
.item-card.done .item-name{text-decoration:line-through;}

.item-check{width:18px;height:18px;border:1px solid var(--muted);border-radius:2px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s;font-size:11px;}
.games .item-check:hover{border-color:var(--crimson2);background:rgba(139,26,42,.2);}
.shows .item-check:hover{border-color:var(--sapphire);background:rgba(42,74,138,.2);}
.books .item-check:hover{border-color:var(--gold);background:rgba(201,168,76,.15);}
.item-card.done .item-check{background:var(--muted);border-color:var(--muted);color:var(--bg);}

.item-body{flex:1;min-width:0;}
.item-name{font-size:14px;color:var(--text);line-height:1.3;cursor:text;outline:none;border-bottom:1px dashed transparent;transition:border-color .2s;}
.item-name:focus{border-color:var(--muted);}
.item-meta{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;cursor:text;outline:none;}
.item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
.games .tag{background:rgba(139,26,42,.25);color:var(--crimson2);border:1px solid rgba(139,26,42,.4);}
.shows .tag{background:rgba(42,74,138,.25);color:#6a9fd8;border:1px solid rgba(42,74,138,.4);}
.books .tag{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.item-del{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 0 0 4px;transition:all .2s;flex-shrink:0;}
.item-card:hover .item-del{opacity:1;}
.item-del:hover{color:var(--crimson2);}

/* ── MEMBER PIPS — 4 states: 0=none 1=started 2=paused 3=done ── */
.member-pips{display:flex;gap:5px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.pip{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;position:relative;flex-shrink:0;}
.pip[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:3px 8px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;color:var(--text);white-space:nowrap;pointer-events:none;z-index:10;}
.pip.s1{border-color:var(--sapphire);background:rgba(42,74,138,.25);box-shadow:0 0 6px rgba(42,74,138,.3);}
.pip.s2{border-color:#b06020;background:rgba(176,96,32,.2);box-shadow:0 0 6px rgba(176,96,32,.3);}
.pip.s3{border-color:var(--gold);background:rgba(201,168,76,.18);box-shadow:0 0 6px rgba(201,168,76,.3);}
.pip.mine{cursor:pointer;}
.pip.mine:hover{transform:scale(1.13);}
.pip.others{cursor:default;opacity:.65;}
.pip-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-left:3px;}
.pip-reset{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;padding:0 2px;transition:color .2s;font-family:'Cinzel',serif;letter-spacing:.05em;opacity:0;}
.member-pips:hover .pip-reset{opacity:1;}
.pip-reset:hover{color:var(--crimson2);}
.item-card.team-done{border-color:var(--gold) !important;}
.item-card.team-done::after{content:'⚜ Complete';position:absolute;top:8px;right:10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}

/* ── MEMBER PIPS ── */
.member-pips{display:flex;gap:5px;margin-top:8px;align-items:center;}
.pip{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;}
.pip[title]:hover::after{content:attr(title);position:absolute;bottom:26px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:3px 8px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;color:var(--text);white-space:nowrap;pointer-events:none;z-index:10;}
.pip.checked{border-color:var(--gold);background:rgba(201,168,76,.15);box-shadow:0 0 6px rgba(201,168,76,.3);}
.pip.mine{cursor:pointer;}
.pip.mine:hover{border-color:var(--gold2);transform:scale(1.1);}
.pip.others{cursor:default;opacity:.6;}
.pip-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-left:2px;}
.item-card.team-done{border-color:var(--gold) !important;}
.item-card.team-done::after{content:'⚜ Complete';position:absolute;top:8px;right:10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}

.add-row{margin-top:10px;display:flex;gap:8px;}
.add-inp{flex:1;background:var(--surface);border:1px dashed var(--border);border-radius:4px;padding:10px 14px;color:var(--text);font-family:'IM Fell English',serif;font-size:14px;outline:none;transition:border-color .2s;}
.add-inp::placeholder{color:var(--muted);font-style:italic;}
.games .add-inp:focus{border-color:var(--crimson);}
.shows .add-inp:focus{border-color:var(--sapphire);}
.books .add-inp:focus{border-color:var(--gold);}
.add-meta{width:150px;background:var(--surface);border:1px dashed var(--border);border-radius:4px;padding:10px 14px;color:var(--text);font-family:'IM Fell English',serif;font-size:13px;font-style:italic;outline:none;}
.add-meta::placeholder{color:var(--muted);}
.add-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;padding:10px 14px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.games .add-btn:hover{border-color:var(--crimson2);color:var(--crimson2);}
.shows .add-btn:hover{border-color:var(--sapphire);color:#6a9fd8;}
.books .add-btn:hover{border-color:var(--gold);color:var(--gold);}
.add-row-tags{margin-top:6px;}
.add-sel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;color:var(--text);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;outline:none;cursor:pointer;transition:border-color .2s;min-width:0;}
.add-sel option{background:var(--surface2);color:var(--text);}
.games .add-sel:focus{border-color:var(--crimson);}
.shows .add-sel:focus{border-color:var(--sapphire);}
.books .add-sel:focus{border-color:var(--gold);}

/* ── REVIEWS ── */
.reviews-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.reviews-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.btn-new-review{background:none;border:1px solid var(--violet);border-radius:4px;color:var(--violet2);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all .2s;}
.btn-new-review:hover{background:rgba(107,63,160,.15);box-shadow:0 0 12px var(--glow-v);}

.review-card{background:var(--surface);bor
